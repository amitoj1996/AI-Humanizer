name: Eval regression (main only)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check-baseline:
    runs-on: ubuntu-latest
    outputs:
      has_baseline: ${{ steps.check.outputs.has_baseline }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f backend/app/eval/baseline.json ]; then
            echo "has_baseline=true" >> $GITHUB_OUTPUT
            echo "Baseline present — eval regression gate will enforce."
          else
            echo "has_baseline=false" >> $GITHUB_OUTPUT
            echo "::warning::No baseline.json committed — eval gate not enforcing."
            echo "::warning::Run 'python -m app.eval.runner --update-baseline' locally and commit."
          fi

  eval:
    needs: check-baseline
    if: needs.check-baseline.outputs.has_baseline == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps (CPU torch)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-eval-${{ runner.os }}-v2
          restore-keys: hf-eval-${{ runner.os }}-

      - name: Run eval regression tests
        working-directory: backend
        run: pytest -m eval -v
