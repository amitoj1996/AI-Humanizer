name: Build Windows Installer

on:
  push:
    tags: ["v*"]
  workflow_dispatch:  # allow manual trigger for testing

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build frontend static export
        shell: pwsh
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend into backend/static
        shell: pwsh
        run: |
          if (Test-Path backend/static) { Remove-Item -Recurse -Force backend/static }
          Copy-Item -Recurse frontend/out backend/static

      - name: Install Python build deps (CPU torch)
        shell: pwsh
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run PyInstaller
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean windows/ai-humanizer.spec

      - name: Download bootstrap installers
        shell: pwsh
        run: |
          windows/bootstrap/download-prereqs.ps1

      - name: Run Inno Setup
        shell: pwsh
        working-directory: windows
        run: |
          iscc installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: AIHumanizerSetup-${{ github.ref_name }}
          path: windows/output/AIHumanizerSetup.exe
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: windows/output/AIHumanizerSetup.exe
          generate_release_notes: true
